<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner Pro: QR + Texto</title>
    <!-- Librerías para QR, OCR y Excel -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #eceff1; color: #333; }
        #reader { width: 100%; max-width: 500px; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.15); background: white; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-excel { background: #1b5e20; color: white; }
        .btn-excel:hover { background: #2e7d32; }
        #results { margin-top: 20px; width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .data-row { border-bottom: 1px solid #eee; padding: 8px 0; font-size: 0.9em; }
        .qr-success { color: #2e7d32; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Escáner de Obra (QR & Texto)</h2>
    
    <!-- Contenedor de la cámara -->
    <div id="reader"></div>

    <div class="controls">
        <button class="btn-excel" onclick="exportToExcel()">Descargar reporte Excel</button>
    </div>

    <div id="results">
        <strong>Registros capturados:</strong>
        <div id="log"></div>
    </div>

    <script>
        let capturedData = [];
        const html5QrCode = new Html5Qrcode("reader");
        const logDiv = document.getElementById('log');

        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        // Función cuando detecta un QR con éxito
        const onScanSuccess = (decodedText, decodedResult) => {
            console.log(`Código detectado: ${decodedText}`);
            
            // Evitar duplicados rápidos
            const ultimoRegistro = capturedData[capturedData.length - 1];
            if (ultimoRegistro && ultimoRegistro.Contenido === decodedText) return;

            const nuevoDato = {
                Fecha: new Date().toLocaleString(),
                Tipo: "Código QR",
                Contenido: decodedText
            };

            capturedData.push(nuevoDato);
            actualizarInterfaz(nuevoDato);
            
            // Vibración breve para avisar que leyó
            if (navigator.vibrate) navigator.vibrate(100);
        };

        function actualizarInterfaz(dato) {
            const row = document.createElement('div');
            row.className = 'data-row';
            row.innerHTML = `<span class="qr-success">[QR]</span> ${dato.Fecha}: ${dato.Contenido}`;
            logDiv.prepend(row);
        }

        // Iniciar la cámara trasera
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            onScanSuccess
        ).catch(err => {
            console.error("Error al iniciar cámara", err);
        });

        // Exportar a Excel
        function exportToExcel() {
            if (capturedData.length === 0) {
                alert("Primero escanea algunos códigos");
                return;
            }
            const worksheet = XLSX.utils.json_to_sheet(capturedData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Escaneos");
            XLSX.writeFile(workbook, "Reporte_Credenciales.xlsx");
        }
    </script>
</body>
</html>
