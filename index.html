<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Credenciales</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f4f4f9; }
        #camera-container { width: 100%; max-width: 500px; position: relative; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        video { width: 100%; display: block; }
        .guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 60%; border: 2px dashed rgba(255,255,255,0.7); border-radius: 8px; pointer-events: none; }
        .controls { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-capture { background: #007bff; color: white; }
        .btn-excel { background: #28a745; color: white; }
        #results { margin-top: 20px; width: 100%; max-width: 500px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #status { font-style: italic; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Escáner de Credenciales</h2>
    
    <div id="camera-container">
        <video id="video" autoplay playsinline></video>
        <div class="guide"></div>
    </div>

    <div class="controls">
        <button class="btn-capture" onclick="captureAndProcess()">Capturar y Leer</button>
        <button class="btn-excel" onclick="exportToExcel()">Descargar Excel</button>
    </div>

    <div id="results">
        <p id="status">Esperando captura...</p>
        <strong>Datos extraídos:</strong>
        <pre id="output">Los datos aparecerán aquí...</pre>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        let capturedData = [];

        // Iniciar cámara
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "Error al acceder a la cámara: " + err;
            }
        }

        // Capturar foto y procesar OCR
        async function captureAndProcess() {
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            status.innerText = "Procesando imagen (OCR)...";
            
            try {
                const result = await Tesseract.recognize(canvas.toDataURL('image/jpeg'), 'spa', {
                    logger: m => console.log(m)
                });

                const text = result.data.text;
                output.innerText = text;
                
                // Guardar en el array para el Excel
                // Aquí podrías usar Regex para separar Nombre, ID, etc.
                capturedData.push({
                    Fecha: new Date().toLocaleString(),
                    Contenido: text.replace(/\n/g, " ")
                });

                status.innerText = "¡Lectura completada!";
            } catch (err) {
                status.innerText = "Error en el reconocimiento.";
                console.error(err);
            }
        }

        // Exportar a Excel
        function exportToExcel() {
            if (capturedData.length === 0) {
                alert("No hay datos para exportar");
                return;
            }
            const worksheet = XLSX.utils.json_to_sheet(capturedData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Escaneos");
            XLSX.writeFile(workbook, "Datos_Credenciales.xlsx");
        }

        startCamera();
    </script>
</body>
</html>
